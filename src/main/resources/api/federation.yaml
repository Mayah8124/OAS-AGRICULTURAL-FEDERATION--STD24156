openapi: 3.1.0
info:
  title: Federation of agricultural communities
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'

components:
  parameters:
    CollectivityId:
      name: collectivityId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
    AttendanceSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1

  schemas:
    Error:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string

    Gender:
      type: string
      enum:
        - FEMALE
        - MALE

    MemberStatus:
      type: string
      enum:
        - ACTIVE
        - RESIGNED

    Role:
      type: string
      enum:
        - PRESIDENT
        - VICE_PRESIDENT
        - TREASURER
        - SECRETARY
        - CONFIRMED_MEMBER
        - JUNIOR_MEMBER

    PaymentMethod:
      type: string
      enum:
        - CASH
        - BANK_TRANSFER
        - MOBILE_MONEY

    ContributionType:
      type: string
      enum:
        - MONTHLY
        - YEARLY
        - ONE_OFF

    AccountType:
      type: string
      enum:
        - CASH
        - BANK
        - MOBILE_MONEY

    MobileMoneyProvider:
      type: string
      enum:
        - ORANGE_MONEY
        - MVOLA
        - AIRTEL_MONEY

    Collectivity:
      type: object
      additionalProperties: false
      required:
        - id
        - number
        - name
        - city
        - specialty
        - creationDate
      properties:
        id:
          type: integer
          format: int32
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date

    CollectivityCreate:
      type: object
      additionalProperties: false
      required:
        - number
        - name
        - city
        - specialty
        - creationDate
      properties:
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date

    Member:
      type: object
      additionalProperties: false
      required:
        - id
        - firstName
        - lastName
        - birthDate
        - gender
        - address
        - job
        - phone
        - email
        - status
      properties:
        id:
          type: integer
          format: int32
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        job:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/MemberStatus'

    MemberAdmission:
      type: object
      additionalProperties: false
      required:
        - sponsorMemberId
        - firstName
        - lastName
        - birthDate
        - gender
        - address
        - job
        - phone
        - email
        - membershipFee
        - paymentMethod
      properties:
        sponsorMemberId:
          type: integer
          format: int32
          minimum: 1
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        job:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        membershipFee:
          type: integer
          format: int32
          minimum: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    MemberTransfer:
      type: object
      additionalProperties: false
      required:
        - targetCollectivityId
      properties:
        targetCollectivityId:
          type: integer
          format: int32
          minimum: 1

    MemberUpdate:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/MemberStatus'

    Contribution:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - memberId
        - type
        - amount
        - paymentMethod
        - paidAt
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        memberId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/ContributionType'
        amount:
          type: integer
          format: int32
          minimum: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        paidAt:
          type: string
          format: date-time

    ContributionCreate:
      type: object
      additionalProperties: false
      required:
        - memberId
        - type
        - amount
        - paymentMethod
        - paidAt
      properties:
        memberId:
          type: integer
          format: int32
          minimum: 1
        type:
          $ref: '#/components/schemas/ContributionType'
        amount:
          type: integer
          format: int32
          minimum: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        paidAt:
          type: string
          format: date-time

    Account:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - type
        - currency
        - balance
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/AccountType'
        currency:
          type: string
          default: MGA
        balance:
          type: number
          format: double
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        mobileMoneyAccount:
          $ref: '#/components/schemas/MobileMoneyAccount'

    AccountCreate:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/AccountType'
        currency:
          type: string
          default: MGA
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        mobileMoneyAccount:
          $ref: '#/components/schemas/MobileMoneyAccount'

    BankAccount:
      type: object
      additionalProperties: false
      required:
        - holderName
        - bankName
        - rib
      properties:
        holderName:
          type: string
        bankName:
          type: string
        rib:
          type: string
          description: 'RIB format: BBBBBGGGGGCCCCCCCCCCCKK'
          pattern: '^\d{23}$'

    MobileMoneyAccount:
      type: object
      additionalProperties: false
      required:
        - holderName
        - provider
        - phoneNumber
      properties:
        holderName:
          type: string
        provider:
          $ref: '#/components/schemas/MobileMoneyProvider'
        phoneNumber:
          type: string

    TreasurySnapshot:
      type: object
      additionalProperties: false
      required:
        - at
        - currency
        - accounts
        - totalBalance
      properties:
        at:
          type: string
          format: date-time
        currency:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalance'
        totalBalance:
          type: number
          format: double

    AccountBalance:
      type: object
      additionalProperties: false
      required:
        - accountId
        - type
        - balance
      properties:
        accountId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: number
          format: double

    Activity:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - type
        - title
        - scheduledAt
        - mandatory
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/ActivityType'
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        mandatory:
          type: boolean

    ActivityType:
      type: string
      enum:
        - GENERAL_ASSEMBLY
        - JUNIOR_TRAINING
        - EXCEPTIONAL

    ActivityCreate:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - scheduledAt
        - mandatory
      properties:
        type:
          $ref: '#/components/schemas/ActivityType'
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        mandatory:
          type: boolean

    AttendanceSession:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - activityId
        - openedAt
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        activityId:
          type: integer
          format: int32
        openedAt:
          type: string
          format: date-time

    AttendanceSessionCreate:
      type: object
      additionalProperties: false
      required:
        - activityId
        - openedAt
      properties:
        activityId:
          type: integer
          format: int32
        openedAt:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - sessionId
        - memberId
        - present
        - recordedAt
      properties:
        id:
          type: integer
          format: int32
        sessionId:
          type: integer
          format: int32
        memberId:
          type: integer
          format: int32
        present:
          type: boolean
        recordedAt:
          type: string
          format: date-time
        excused:
          type: boolean
        excuseReason:
          type: string

    AttendanceRecordCreate:
      type: object
      additionalProperties: false
      required:
        - memberId
        - present
        - recordedAt
      properties:
        memberId:
          type: integer
          format: int32
          minimum: 1
        present:
          type: boolean
        recordedAt:
          type: string
          format: date-time
        excused:
          type: boolean
        excuseReason:
          type: string

    CollectivityStatistics:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - attendanceRate
        - activeMembersCount
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        attendanceRate:
          type: number
          format: double
        activeMembersCount:
          type: integer
          format: int32

    MemberStatistics:
      type: object
      additionalProperties: false
      required:
        - memberId
        - from
        - to
        - attendanceRate
        - totalPaid
        - unpaidPotential
      properties:
        memberId:
          type: integer
          format: int32
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        attendanceRate:
          type: number
          format: double
        totalPaid:
          type: integer
          format: int32
        unpaidPotential:
          type: integer
          format: int32