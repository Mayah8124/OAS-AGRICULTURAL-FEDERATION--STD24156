openapi: 3.1.0
info:
  title: Federation of agricultural communities
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'

tags:
  - name: Collectivités
  - name: Membres
  - name: Cotisations
  - name: Comptes
  - name: Activités
  - name: Présences
  - name: Statistiques

paths:
  /collectivities:
    post:
      tags:
        - Collectivités
      summary: Ouvrir une nouvelle collectivité
      description: Création d'une nouvelle collectivité agricole.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}:
    get:
      tags:
        - Collectivités
      summary: Récupérer une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/members:
    post:
      tags:
        - Membres
      summary: Admettre un nouveau membre dans une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberAdmission'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Membres
      summary: Lister les membres d'une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MemberStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/{memberId}/transfer:
    post:
      tags:
        - Membres
      summary: Changer de collectivité
      description: Transférer un membre vers une autre collectivité.
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberTransfer'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/{memberId}:
    patch:
      tags:
        - Membres
      summary: Mettre à jour l'état d'un membre (démission)
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/contributions:
    post:
      tags:
        - Cotisations
      summary: Enregistrer un encaissement (cotisation/paiement)
      description: Enregistre un paiement (mensuel, annuel ou ponctuel) effectué par un membre.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContributionCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Cotisations
      summary: Lister les encaissements d'une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contribution'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/accounts:
    post:
      tags:
        - Comptes
      summary: Créer un compte de trésorerie
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Comptes
      summary: Lister les comptes de trésorerie d'une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/treasury/snapshot:
    get:
      tags:
        - Comptes
      summary: Situation de trésorerie à une date donnée
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: at
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreasurySnapshot'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/activities:
    get:
      tags:
        - Activités
      summary: Lister les activités d'une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Activités
      summary: Planifier une activité exceptionnelle
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/activities/mandatory:
    get:
      tags:
        - Activités
      summary: Récupérer les activités obligatoires
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: year
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/attendance/sessions:
    post:
      tags:
        - Présences
      summary: Ouvrir une session de présence pour une activité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceSessionCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSession'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /attendance/sessions/{sessionId}/records:
    post:
      tags:
        - Présences
      summary: Marquer la présence d'un membre
      parameters:
        - $ref: '#/components/parameters/AttendanceSessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRecordCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/statistics:
    get:
      tags:
        - Statistiques
      summary: Statistiques globales d'une collectivité
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityStatistics'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collectivities/{collectivityId}/statistics/members:
    get:
      tags:
        - Statistiques
      summary: Statistiques détaillées par membre actif
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberStatistics'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  parameters:
    CollectivityId:
      name: collectivityId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
    AttendanceSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1

  schemas:
    Error:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string

    Gender:
      type: string
      enum:
        - FEMALE
        - MALE

    MemberStatus:
      type: string
      enum:
        - ACTIVE
        - RESIGNED

    Role:
      type: string
      enum:
        - PRESIDENT
        - VICE_PRESIDENT
        - TREASURER
        - SECRETARY
        - CONFIRMED_MEMBER
        - JUNIOR_MEMBER

    PaymentMethod:
      type: string
      enum:
        - CASH
        - BANK_TRANSFER
        - MOBILE_MONEY

    ContributionType:
      type: string
      enum:
        - MONTHLY
        - YEARLY
        - ONE_OFF

    AccountType:
      type: string
      enum:
        - CASH
        - BANK
        - MOBILE_MONEY

    MobileMoneyProvider:
      type: string
      enum:
        - ORANGE_MONEY
        - MVOLA
        - AIRTEL_MONEY

    Collectivity:
      type: object
      additionalProperties: false
      required:
        - id
        - number
        - name
        - city
        - specialty
        - creationDate
      properties:
        id:
          type: integer
          format: int32
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date

    CollectivityCreate:
      type: object
      additionalProperties: false
      required:
        - number
        - name
        - city
        - specialty
        - creationDate
      properties:
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date

    Member:
      type: object
      additionalProperties: false
      required:
        - id
        - firstName
        - lastName
        - birthDate
        - gender
        - address
        - job
        - phone
        - email
        - status
      properties:
        id:
          type: integer
          format: int32
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        job:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: '#/components/schemas/MemberStatus'

    MemberAdmission:
      type: object
      additionalProperties: false
      required:
        - sponsors
        - firstName
        - lastName
        - birthDate
        - gender
        - address
        - job
        - phone
        - email
        - membershipFee
        - annualDuesAmount
        - paymentMethod
      properties:
        sponsors:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Sponsor'
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        job:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        membershipFee:
          type: integer
          format: int32
          minimum: 0
          description: Frais d'adhésion (50 000 Ar).
        annualDuesAmount:
          type: integer
          format: int32
          minimum: 0
          description: Montant total des cotisations annuelles obligatoires à payer lors de l'adhésion.
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    Sponsor:
      type: object
      additionalProperties: false
      required:
        - sponsorMemberId
        - relationship
      properties:
        sponsorMemberId:
          type: integer
          format: int32
          minimum: 1
        relationship:
          type: string
          description: Nature de la relation avec le candidat.

    MemberTransfer:
      type: object
      additionalProperties: false
      required:
        - targetCollectivityId
      properties:
        targetCollectivityId:
          type: integer
          format: int32
          minimum: 1

    MemberUpdate:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/MemberStatus'

    Contribution:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - memberId
        - type
        - amount
        - paymentMethod
        - paidAt
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        memberId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/ContributionType'
        amount:
          type: integer
          format: int32
          minimum: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        paidAt:
          type: string
          format: date-time

    ContributionCreate:
      type: object
      additionalProperties: false
      required:
        - memberId
        - type
        - amount
        - paymentMethod
        - paidAt
      properties:
        memberId:
          type: integer
          format: int32
          minimum: 1
        type:
          $ref: '#/components/schemas/ContributionType'
        amount:
          type: integer
          format: int32
          minimum: 0
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        paidAt:
          type: string
          format: date-time

    Account:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - type
        - currency
        - balance
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/AccountType'
        currency:
          type: string
          default: MGA
        balance:
          type: number
          format: double
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        mobileMoneyAccount:
          $ref: '#/components/schemas/MobileMoneyAccount'

    AccountCreate:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/AccountType'
        currency:
          type: string
          default: MGA
        bankAccount:
          $ref: '#/components/schemas/BankAccount'
        mobileMoneyAccount:
          $ref: '#/components/schemas/MobileMoneyAccount'

    BankAccount:
      type: object
      additionalProperties: false
      required:
        - holderName
        - bankName
        - rib
      properties:
        holderName:
          type: string
        bankName:
          type: string
        rib:
          type: string
          description: 'RIB format: BBBBBGGGGGCCCCCCCCCCCKK'
          pattern: '^\d{23}$'

    MobileMoneyAccount:
      type: object
      additionalProperties: false
      required:
        - holderName
        - provider
        - phoneNumber
      properties:
        holderName:
          type: string
        provider:
          $ref: '#/components/schemas/MobileMoneyProvider'
        phoneNumber:
          type: string

    TreasurySnapshot:
      type: object
      additionalProperties: false
      required:
        - at
        - currency
        - accounts
        - totalBalance
      properties:
        at:
          type: string
          format: date-time
        currency:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalance'
        totalBalance:
          type: number
          format: double

    AccountBalance:
      type: object
      additionalProperties: false
      required:
        - accountId
        - type
        - balance
      properties:
        accountId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: number
          format: double

    Activity:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - type
        - title
        - scheduledAt
        - mandatory
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        type:
          $ref: '#/components/schemas/ActivityType'
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        mandatory:
          type: boolean

    ActivityType:
      type: string
      enum:
        - GENERAL_ASSEMBLY
        - JUNIOR_TRAINING
        - EXCEPTIONAL

    ActivityCreate:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - scheduledAt
        - mandatory
      properties:
        type:
          $ref: '#/components/schemas/ActivityType'
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        mandatory:
          type: boolean

    AttendanceSession:
      type: object
      additionalProperties: false
      required:
        - id
        - collectivityId
        - activityId
        - openedAt
      properties:
        id:
          type: integer
          format: int32
        collectivityId:
          type: integer
          format: int32
        activityId:
          type: integer
          format: int32
        openedAt:
          type: string
          format: date-time

    AttendanceSessionCreate:
      type: object
      additionalProperties: false
      required:
        - activityId
        - openedAt
      properties:
        activityId:
          type: integer
          format: int32
        openedAt:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      additionalProperties: false
      required:
        - id
        - sessionId
        - memberId
        - present
        - recordedAt
      properties:
        id:
          type: integer
          format: int32
        sessionId:
          type: integer
          format: int32
        memberId:
          type: integer
          format: int32
        present:
          type: boolean
        recordedAt:
          type: string
          format: date-time
        excused:
          type: boolean
        excuseReason:
          type: string

    AttendanceRecordCreate:
      type: object
      additionalProperties: false
      required:
        - memberId
        - present
        - recordedAt
      properties:
        memberId:
          type: integer
          format: int32
          minimum: 1
        present:
          type: boolean
        recordedAt:
          type: string
          format: date-time
        excused:
          type: boolean
        excuseReason:
          type: string

    CollectivityStatistics:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - attendanceRate
        - activeMembersCount
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        attendanceRate:
          type: number
          format: double
        activeMembersCount:
          type: integer
          format: int32

    MemberStatistics:
      type: object
      additionalProperties: false
      required:
        - memberId
        - from
        - to
        - attendanceRate
        - totalPaid
        - unpaidPotential
      properties:
        memberId:
          type: integer
          format: int32
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        attendanceRate:
          type: number
          format: double
        totalPaid:
          type: integer
          format: int32
        unpaidPotential:
          type: integer
          format: int32

    FederationStatistics:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - collectivityAttendanceRates
        - collectivityUpToDateMembersRates
